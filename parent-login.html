<!DOCTYPE html>
<html>
<head>

<title>Sundar J.J School - Parents Portal</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<style>

body{
font-family: 'Segoe UI', Arial;
background: linear-gradient(135deg, #3b82f6, #93c5fd);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
background:white;
padding:35px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,0.2);
text-align:center;
width:320px;
animation:fadeIn 1s ease;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(30px);}
to{opacity:1; transform:translateY(0);}
}

.logo{
width:80px;
margin-bottom:10px;
}

.title{
color:#1e3a8a;
margin-bottom:5px;
font-size:22px;
}

.subtitle{
color:#555;
margin-bottom:20px;
font-size:14px;
}

input{
padding:12px;
margin:10px 0;
width:100%;
border:1px solid #ccc;
border-radius:10px;
outline:none;
font-size:14px;
transition:0.3s;
}

input:focus{
border-color:#3b82f6;
box-shadow:0 0 8px rgba(59,130,246,0.4);
}

button{
padding:12px;
width:100%;
background: linear-gradient(135deg, #2563eb, #1d4ed8);
border:none;
color:white;
cursor:pointer;
border-radius:10px;
font-size:15px;
font-weight:bold;
transition:0.3s;
}

button:hover{
transform:scale(1.03);
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.hidden{
display:none;
}

#recaptcha{
margin-top:10px;
}

</style>

</head>

<body>

<div class="box">

<img src="logo.png" class="logo">

<h2 class="title">Sundar J.J School</h2>
<p class="subtitle">Parents Portal</p>

<div id="step1">

<input id="phone" placeholder="+91XXXXXXXXXX">

<div id="recaptcha"></div>

<button onclick="sendOTP()">Send OTP</button>

</div>

<div id="step2" class="hidden">

<input id="otp" placeholder="Enter OTP">

<button onclick="verifyOTP()">Verify OTP</button>

</div>

</div>

<script>

// 🔴 তোমার Firebase config বসাও
const firebaseConfig = {
  apiKey: "AIzaSyArpgBPwqlP5AImr2h32VLmbtaxLr0Bknc",
  authDomain: "sjjs-school-erp.firebaseapp.com",
  projectId: "sjjs-school-erp",
};

firebase.initializeApp(firebaseConfig);

// 🔐 Recaptcha setup
window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha', {
  size: 'invisible'
});

// 📲 Send OTP
function sendOTP(){

let phone=document.getElementById("phone").value

if(!phone.startsWith("+") || phone.length < 12){
alert("Use format: +91XXXXXXXXXX")
return
}

firebase.auth().signInWithPhoneNumber(phone, window.recaptchaVerifier)
.then(function(confirmationResult){

window.confirmationResult = confirmationResult

// UI change
document.getElementById("step1").classList.add("hidden")
document.getElementById("step2").classList.remove("hidden")

alert("OTP Sent")

})
.catch(function(error){
alert("Error: "+error.message)
})

}

// ✅ Verify OTP
function verifyOTP(){

let otp=document.getElementById("otp").value

window.confirmationResult.confirm(otp)
.then(function(){

alert("Login Success")

// 👉 Dashboard এ redirect
window.location="parent-dashboard.html"

})
.catch(function(error){
alert("Error: " + error.message)
})

}
</script>

</body>
</html>
