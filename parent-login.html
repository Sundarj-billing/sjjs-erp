<!DOCTYPE html>
<html>
<head>

<title>Parent Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<link rel="manifest" href="manifest.json">

  <style>

body{
font-family:'Segoe UI', Arial;
background: linear-gradient(135deg,#3b82f6,#60a5fa);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

/* MOBILE CARD */
.box{
background:white;
padding:25px 20px;
border-radius:20px;
width:90%;
max-width:360px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

/* LOGO */
.logo{
width:55px;
margin-bottom:8px;
}

h2{
margin:10px 0 20px;
color:#1e3a8a;
font-size:22px;
}

/* INPUT */
.input-box{
position:relative;
margin:12px 0;
}

.input-box input{
width:100%;
padding:14px;
padding-right:45px;
border-radius:12px;
border:1px solid #ddd;
box-sizing:border-box;
font-size:15px;
transition:0.3s;
}

.input-box input:focus{
outline:none;
border-color:#2563eb;
box-shadow:0 0 8px rgba(37,99,235,0.3);
}

/* EYE */
.eye{
position:absolute;
right:12px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
font-size:18px;
color:#666;
}

/* BUTTON */
button{
padding:14px;
width:100%;
background: linear-gradient(135deg,#2563eb,#1d4ed8);
color:white;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:bold;
margin-top:12px;
font-size:15px;
transition:0.3s;
}

button:active{
transform:scale(0.97);
}

/* FORGOT */
.forgot{
color:#2563eb;
cursor:pointer;
margin-top:14px;
font-size:14px;
}

/* 📱 EXTRA MOBILE OPTIMIZATION */
@media(max-width:400px){

.box{
padding:20px 15px;
}

h2{
font-size:20px;
}

.input-box input{
padding:12px;
}

}

</style>

</head>

<body>

<div class="box">

<img src="https://cdn-icons-png.flaticon.com/512/3135/3135755.png" class="logo">

<h2>Parent Login</h2>

<div class="input-box">
<input id="userID" placeholder="Student ID">
</div>

<div class="input-box">
<input type="password" id="password" placeholder="Password">
<span class="eye" onclick="togglePassword()">👁</span>
</div>

<button onclick="login()">Login</button>

<p class="forgot" onclick="forgotPassword()">Forgot Password?</p>

</div>

<script>

const firebaseConfig={
apiKey:"AIzaSyArpgBPwqlP5AImr2h32VLmbtaxLr0Bknc",
authDomain:"sjjs-school-erp.firebaseapp.com",
projectId:"sjjs-school-erp"
};

firebase.initializeApp(firebaseConfig)
const db=firebase.firestore()

function togglePassword(){
let pass=document.getElementById("password")
pass.type = pass.type === "password" ? "text" : "password"
}

async function login(){

let id=document.getElementById("userID").value.trim().toUpperCase()
let pass=document.getElementById("password").value

if(!id || !pass){
alert("Enter all fields")
return
}

try{

let doc=await db.collection("students_billing").doc(id).get()

if(!doc.exists){
alert("Invalid ID")
return
}

let data=doc.data()

if(data.Password === pass){

localStorage.setItem("studentID", id)

alert("Login Success")

window.location="parent-dashboard.html"

}else{
alert("Wrong Password")
}

}catch(e){
alert("Error: " + e.message)
}

}

async function forgotPassword(){

let id=document.getElementById("userID").value.trim().toUpperCase()

if(!id){
alert("Enter Student ID first")
return
}

let doc=await db.collection("students_billing").doc(id).get()

if(!doc.exists){
alert("Student not found")
return
}

let data=doc.data()

alert("Your Password: " + data.Password)

}

</script>

</body>
</html>
