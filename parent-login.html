<!DOCTYPE html>
<html>
<head>

<title>Sundar J.J School - Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>

body{
font-family:'Segoe UI', Arial;
background: linear-gradient(135deg,#3b82f6,#93c5fd);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
background:white;
padding:30px;
border-radius:15px;
width:320px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.title{
color:#1e3a8a;
}

.input-group{
position:relative;
}

input{
padding:12px;
margin:10px 0;
width:100%;
border-radius:8px;
border:1px solid #ccc;
}

.eye{
position:absolute;
right:10px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
font-size:14px;
color:#2563eb;
}

button{
padding:12px;
width:100%;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

.link{
margin-top:10px;
color:#2563eb;
cursor:pointer;
font-size:13px;
}

</style>

</head>

<body>

<div class="box">

<h2 class="title">Sundar J.J School</h2>
<p>Parent Login</p>

<input id="userid" placeholder="Enter Student ID">

<div class="input-group">
<input id="password" type="password" placeholder="Enter Password">
<span class="eye" onclick="togglePassword()">👁</span>
</div>

<button onclick="login()">Login</button>

<div class="link" onclick="forgotPassword()">Forgot Password?</div>

</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyArpgBPwqlP5AImr2h32VLmbtaxLr0Bknc",
  authDomain: "sjjs-school-erp.firebaseapp.com",
  projectId: "sjjs-school-erp",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 👁 Show/Hide Password
function togglePassword(){
let pass = document.getElementById("password")

if(pass.type === "password"){
pass.type = "text"
}else{
pass.type = "password"
}
}

// 🔐 Login
async function login(){

let id = document.getElementById("userid").value.toUpperCase().trim()
let pass = document.getElementById("password").value

if(!id || !pass){
alert("Enter all fields")
return
}

let doc = await db.collection("students_billing").doc(id).get()

if(doc.exists){

let data = doc.data()

if(data.Password == pass){

localStorage.setItem("studentID", id)

alert("Login Success")
window.location="parent-dashboard.html"

}else{
alert("Wrong Password")
}

}else{
alert("User not found")
}

}

// 🔁 Forgot Password
async function forgotPassword(){

let id = prompt("Enter your Student ID")

if(!id) return

let doc = await db.collection("students_billing").doc(id.toUpperCase()).get()

if(doc.exists){

let data = doc.data()

alert("Your Password: " + data.Password)

}else{
alert("Student not found")
}

}

</script>

</body>
</html>
