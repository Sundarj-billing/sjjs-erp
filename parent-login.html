<!DOCTYPE html>
<html>
<head>

<title>Parent Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<link rel="manifest" href="manifest.json">

<style>

body{
font-family:'Segoe UI', Arial;
background: linear-gradient(135deg,#3b82f6,#60a5fa);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
background:white;
padding:25px 20px;
border-radius:20px;
width:90%;
max-width:360px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.logo{
width:55px;
margin-bottom:8px;
}

h2{
margin:10px 0 20px;
color:#1e3a8a;
font-size:22px;
}

.input-box{
position:relative;
margin:12px 0;
}

.input-box input{
width:100%;
padding:14px;
padding-right:45px;
border-radius:12px;
border:1px solid #ddd;
box-sizing:border-box;
font-size:15px;
}

.eye{
position:absolute;
right:12px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
font-size:18px;
}

button{
padding:14px;
width:100%;
background: linear-gradient(135deg,#2563eb,#1d4ed8);
color:white;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:bold;
margin-top:12px;
}

.forgot{
color:#2563eb;
cursor:pointer;
margin-top:14px;
font-size:14px;
}

</style>

</head>

<body>

<div class="box">

<img src="https://cdn-icons-png.flaticon.com/512/3135/3135755.png" class="logo">

<h2>Parent Login</h2>

<div class="input-box">
<input id="userID" placeholder="Student ID">
</div>

<div class="input-box">
<input type="password" id="password" placeholder="Password">
<span class="eye" onclick="togglePassword()">👁</span>
</div>

<button onclick="login()">Login</button>

<p class="forgot" onclick="forgotPassword()">Forgot Password?</p>

</div>

<script>

// 🔥 Firebase Config
const firebaseConfig={
apiKey:"AIzaSyArpgBPwqlP5AImr2h32VLmbtaxLr0Bknc",
authDomain:"sjjs-school-erp.firebaseapp.com",
projectId:"sjjs-school-erp"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

// 👁 Toggle Password
function togglePassword(){
let pass=document.getElementById("password");
pass.type = pass.type === "password" ? "text" : "password";
}

// 🔐 HASH FUNCTION (FINAL)
async function hashPassword(password){
  const encoder = new TextEncoder();
  const data = encoder.encode(password);
  const hashBuffer = await crypto.subtle.digest("SHA-256", data);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, "0")).join("");
}

// 🔥 LOGIN FUNCTION (FINAL FIXED)
async function login(){

let id=document.getElementById("userID").value.trim().toUpperCase();
let pass=document.getElementById("password").value;

if(!id || !pass){
alert("Enter all fields");
return;
}

try{

let doc=await db.collection("students_billing").doc(id).get();

if(!doc.exists){
alert("Invalid ID");
return;
}

let data=doc.data();

// 🔥 hash input password
const hashedInput = await hashPassword(pass);

// 🔥 SAFE CHECK
if(data.Password && data.Password === hashedInput){

localStorage.setItem("studentID", id);

alert("Login Success");

window.location="parent-dashboard.html";

}else{
alert("Wrong Password");
}

}catch(e){
alert("Error: " + e.message);
}

}

// 🔥 FORGOT PASSWORD (SAFE)
async function forgotPassword(){

let id=document.getElementById("userID").value.trim().toUpperCase();

if(!id){
alert("Enter Student ID first");
return;
}

let doc=await db.collection("students_billing").doc(id).get();

if(!doc.exists){
alert("Student not found");
return;
}

alert("Contact school for password reset");

}

// 🔥 Service Worker
if("serviceWorker" in navigator){
navigator.serviceWorker.register("sw.js")
.then(()=>console.log("Service Worker Ready"));
}

</script>

</body>
</html>
