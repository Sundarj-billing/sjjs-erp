<!DOCTYPE html>
<html>
<head>

<title>Parent Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>

body{
font-family:Arial;
background: linear-gradient(135deg,#3b82f6,#93c5fd);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
background:white;
padding:30px;
border-radius:15px;
width:320px;
text-align:center;
}

input{
padding:12px;
margin:10px 0;
width:100%;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:12px;
width:100%;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

.toggle{
position:absolute;
right:20px;
top:42px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="box">

<h2>Parent Login</h2>

<input id="userID" placeholder="Student ID">

<div style="position:relative;">
<input type="password" id="password" placeholder="Password">
<span class="toggle" onclick="togglePassword()">👁</span>
</div>

<button onclick="login()">Login</button>

<p onclick="forgotPassword()" style="color:blue;cursor:pointer;margin-top:10px;">
Forgot Password?
</p>

</div>

<script>

const firebaseConfig={
apiKey:"AIzaSyArpgBPwqlP5AImr2h32VLmbtaxLr0Bknc",
authDomain:"sjjs-school-erp.firebaseapp.com",
projectId:"sjjs-school-erp"
};

firebase.initializeApp(firebaseConfig)
const db=firebase.firestore()

// 👁 Show / Hide password
function togglePassword(){
let pass=document.getElementById("password")

if(pass.type==="password"){
pass.type="text"
}else{
pass.type="password"
}
}

// 🔐 Login function
async function login(){

let id=document.getElementById("userID").value.trim().toUpperCase()
let pass=document.getElementById("password").value

if(!id || !pass){
alert("Enter all fields")
return
}

let doc=await db.collection("students_billing").doc(id).get()

if(!doc.exists){
alert("❌ Invalid ID")
return
}

let data=doc.data()

if(data.Password === pass){

localStorage.setItem("studentID", id)

  alert("✅ Login Success")

window.location="parent-dashboard.html"
}
 
}else{
alert("❌ Wrong Password")
}

}

// 🔁 Forgot password
async function forgotPassword(){

let id=document.getElementById("userID").value.trim().toUpperCase()

if(!id){
alert("Enter Student ID first")
return
}

let doc=await db.collection("students_billing").doc(id).get()

if(!doc.exists){
alert("Student not found")
return
}

let data=doc.data()

alert("Your Password: " + data.Password)

}

</script>

</body>
</html>
