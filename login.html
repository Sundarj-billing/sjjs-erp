<!DOCTYPE html>
<html>
<head>

<title>Sundar Jibaner Janna School</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#3b82f6,#9333ea);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.box{
background:#1f2937;
padding:40px;
border-radius:15px;
text-align:center;
width:300px;
box-shadow:0 0 20px rgba(0,0,0,0.5);
}

input{
padding:12px;
margin:10px 0;
width:100%;
border-radius:6px;
border:none;
}

button{
padding:12px;
width:100%;
background:#22c55e;
border:none;
color:white;
cursor:pointer;
border-radius:6px;
font-weight:bold;
transition:0.3s;
}

button:hover{
background:#16a34a;
}
  h2{
margin-bottom:20px;
}
</style>

</head>

<body>

<div class="box">

<img src="https://cdn-icons-png.flaticon.com/512/3135/3135755.png" width="70"><br><br>

<h2>Sundar Jibaner Janna School</h2>

<input id="email" placeholder="Admin Email">
  
  <input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<script>

const firebaseConfig={
apiKey:"AIzaSyArpgBPwqlP5AImr2h32VLmbtaxLr0Bknc",
authDomain:"sjjs-school-erp.firebaseapp.com",
projectId:"sjjs-school-erp"
};

firebase.initializeApp(firebaseConfig);

/* CHECK LOGIN SESSION */

firebase.auth().onAuthStateChanged(user=>{

if(user){
window.location="admin.html"
}

})

/* LOGIN FUNCTION */

function login(){

let email=document.getElementById("email").value
let pass=document.getElementById("password").value

firebase.auth().signInWithEmailAndPassword(email,pass)

.then(()=>{

window.location="admin.html"

})

.catch(err=>{

alert(err.message)

})

}

</script>

</body>
</html>
