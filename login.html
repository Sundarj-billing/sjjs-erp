<!DOCTYPE html>
<html>
<head>

<title>Sundar Jibaner Janna School</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#3b82f6,#9333ea);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.box{
background:rgba(31,41,55,0.9);
padding:40px;
border-radius:20px;
text-align:center;
width:320px;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
}

input{
padding:12px;
margin:10px 0;
width:100%;
border-radius:8px;
border:2px solid transparent;
outline:none;
font-size:14px;
box-sizing:border-box;
}
  input:focus{
border:2px solid #22c55e;
}

button{
padding:12px;
width:100%;
background:linear-gradient(135deg,#22c55e,#16a34a);
border:none;
color:white;
cursor:pointer;
border-radius:8px;
font-weight:bold;
transition:0.3s;
}
button:active{
transform:scale(0.97);
}
button:hover{
transform:scale(1.05);
}
  h2{
margin-bottom:20px;
}
  label{
display:block;
text-align:left;
margin-top:10px;
font-size:14px;
color:#d1d5db;
}
</style>

</head>

<body>

<div class="box">

<img src="https://cdn-icons-png.flaticon.com/512/3135/3135755.png" width="70"><br><br>

<h2>Sundar Jibaner Janna School</h2>

<label>Email</label>
<input id="email" type="email" placeholder="Enter admin email">

<label>Password</label>
<input id="password" type="password" placeholder="Enter password">
<button onclick="login()">Login</button>
<span id="toggleText" onclick="togglePass()" style="cursor:pointer;font-size:12px;color:#9ca3af;">
Show Password
</span>
  
</div>

<script>

const firebaseConfig={
apiKey:"AIzaSyArpgBPwqlP5AImr2h32VLmbtaxLr0Bknc",
authDomain:"sjjs-school-erp.firebaseapp.com",
projectId:"sjjs-school-erp"
};

firebase.initializeApp(firebaseConfig);

/* CHECK LOGIN SESSION */

firebase.auth().onAuthStateChanged(user=>{

if(user){
window.location="admin.html"
}

})

/* LOGIN FUNCTION */

function login(){

let email=document.getElementById("email").value
let pass=document.getElementById("password").value

firebase.auth().signInWithEmailAndPassword(email,pass)

.then(()=>{

window.location="admin.html"

})

.catch(err=>{

alert(err.message)

})

}
function togglePass(){
let p=document.getElementById("password")
let t=document.getElementById("toggleText")

if(p.type==="password"){
p.type="text"
t.innerText="Hide Password"
}else{
p.type="password"
t.innerText="Show Password"
}
}
</script>

</body>
</html>
