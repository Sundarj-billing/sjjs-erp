<!DOCTYPE html>
<html>
<head>

<title>Sundar J.J School - Parent Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

.card{
background:white;
margin:15px;
padding:18px;
border-radius:15px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
border-left:5px solid #22c55e; /* green side line */
}

.card h3{
margin-bottom:10px;
color:#2563eb;
font-size:16px;
border-bottom:1px solid #eee;
padding-bottom:5px;
}

.row{
display:flex;
justify-content:space-between;
margin:8px 0;
font-size:14px;
}

.total{
color:#16a34a;
font-weight:bold;
font-size:17px;
}
  
.paid{
background:#dcfce7;
color:#166534;
padding:8px;
border-radius:8px;
text-align:center;
font-weight:bold;
}
  
body{
font-family:'Segoe UI';
background:#ecfdf5; /* light green */
margin:0;
}
  
.header{
background: linear-gradient(135deg,#16a34a,#15803d);
color:white;
padding:20px;
text-align:center;
}
  
button{padding:12px;width:100%;margin-top:10px;border:none;border-radius:8px;}
.payBtn{background:green;color:white;}
.logoutBtn{background:red;color:white;}
  

  
#paymentPopup,#receiptPopup{
display:none;position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.5);justify-content:center;align-items:center;
}
.popupBox{background:white;padding:20px;border-radius:10px;width:90%;max-width:350px;}

  #receiptContent{
position:relative;
}
  
</style>

</head>

<body>

<div class="header">
<h2>Sundar J.J School</h2>
<p>Parent Dashboard</p>
</div>

<div id="content"></div>

<!-- PAYMENT POPUP -->
<div id="paymentPopup">
<div class="popupBox">
<h3>Payment Details</h3>
<div class="row"><span>Total Due</span><span id="dueAmount"></span></div>
<div class="row"><span>Charge (2%)</span><span id="chargeAmount"></span></div>
<hr>
<div class="row total"><span>Total Payable</span><span id="finalAmount"></span></div>
<button class="payBtn" onclick="confirmPayment()">Pay Now</button>
<button class="logoutBtn" onclick="closePopup()">Cancel</button>
</div>
</div>

<!-- RECEIPT POPUP -->
<div id="receiptPopup">
<div class="popupBox" id="receiptContent">

<h3 style="text-align:center;">Payment Receipt</h3>

<p><b>Receipt No:</b> <span id="rNo"></span></p>
<p><b>Name:</b> <span id="rName"></span></p>
<p><b>Student ID:</b> <span id="rID"></span></p>
<p><b>Class:</b> <span id="rClass"></span></p>
<p><b>Amount:</b> ₹<span id="rAmount"></span></p>
<p><b>Date:</b> <span id="rDate"></span></p>

<div style="position:absolute;top:40%;left:20%;font-size:60px;color:rgba(0,0,0,0.1);transform:rotate(-30deg);">
PAID
</div>

<button class="payBtn" onclick="downloadReceipt()">Download</button>
<button class="logoutBtn" onclick="closeReceipt()">Close</button>

</div>
</div>

<script>

// Firebase
const firebaseConfig = {
apiKey: "AIzaSyArpgBPwqlP5AImr2h32VLmbtaxLr0Bknc",
authDomain: "sjjs-school-erp.firebaseapp.com",
projectId: "sjjs-school-erp",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let id = localStorage.getItem("studentID");
if(!id){
alert("Login first");
window.location="parent-login.html";
}

let finalPayAmount = 0;

// LOAD DATA
async function loadData(){

let doc = await db.collection("students_billing").doc(id).get();

if(doc.exists){

let data = doc.data();

let today = new Date().toLocaleDateString('en-IN',{
day:'numeric', month:'short', year:'numeric'
});

let baseTotal = Number(data.Balance_Due || 0);

let action = "";

if(baseTotal <= 0){
action = `<div class="paid">✅ Payment Completed</div>`;
}else{
action = `<button class="payBtn" onclick="openPaymentPopup(${baseTotal})">Pay Now</button>`;
}
  document.getElementById("content").innerHTML = `

<div class="card">
<h3>👤 Student Details</h3>

<div class="row"><span>🧑 Name</span><span>${data.Student_Name}</span></div>
<div class="row"><span>🆔 Student ID</span><span>${data.Student_ID}</span></div>
<div class="row"><span>🏫 Class</span><span>${data.Class}</span></div>
<div class="row"><span>📅 Month</span><span>${data.Month || "N/A"}</span></div>
<div class="row"><span>📆 Date</span><span>${today}</span></div>
</div>

<div class="card">
<h3>💰 Payment Details</h3>

<div class="row"><span>💵 Monthly Fee</span><span>₹${data.Monthly_Fee || 0}</span></div>
<div class="row"><span>📝 Exam Fee</span><span>₹${data.Exam_Fee || 0}</span></div>
<div class="row"><span>📌 Previous Due</span><span>₹${data.Due_Previous || 0}</span></div>
<div class="row"><span>⏰ Late Fee</span><span>₹${data.Late_Fee || 0}</span></div>

<hr>

<div class="row total"><span>Total Due</span><span>₹${baseTotal}</span></div>

${action}
</div>

<div class="card">
<button class="logoutBtn" onclick="logout()">Logout</button>
</div>

`;
}
}
  
// PAYMENT POPUP
function openPaymentPopup(amount){
let charge = Math.round(amount*0.02);
let final = amount+charge;

finalPayAmount = final;

dueAmount.innerText="₹"+amount;
chargeAmount.innerText="₹"+charge;
finalAmount.innerText="₹"+final;

paymentPopup.style.display="flex";
}

function closePopup(){
paymentPopup.style.display="none";
}

function confirmPayment(){
closePopup();
payNow(finalPayAmount);
}

// PAYMENT
async function payNow(amount){

let options = {
key:"rzp_test_STar8rHKqlaSNf",
amount:amount*100,
currency:"INR",
name:"SJJ School",

handler: async function(){

alert("✅ Payment Successful");

let docSnap = await db.collection("students_billing").doc(id).get();
let data = docSnap.data();

showReceipt(data,amount);

await updatePayment();

}

};

new Razorpay(options).open();
}

// RECEIPT SHOW
function showReceipt(data,amount){

let receiptNo = "SJ-"+Date.now();

rNo.innerText = receiptNo;
rName.innerText = data.Student_Name;
rID.innerText = data.Student_ID;
rClass.innerText = data.Class;
rAmount.innerText = amount;
rDate.innerText = new Date().toLocaleString();

receiptPopup.style.display="flex";
}

// DOWNLOAD PDF
function downloadReceipt(){

const { jsPDF } = window.jspdf;
let doc = new jsPDF();

let receiptNo = document.getElementById("rNo").innerText;

// 🖼️ LOGO (replace with your github raw link)
let img = new Image();
img.src = "https://raw.githubusercontent.com/Sundarj-billing/sjjs-erp/main/logo.png?raw=true";

img.onload = function(){

// 🔷 LOGO add
doc.addImage(img, 'PNG', 20, 15, 30, 30);

// 🔷 HEADER
doc.setFontSize(18);
doc.text("Sundar J.J School", 60, 25);

doc.setFontSize(10);
doc.text("Address: Your School Address", 60, 32);
doc.text("Phone: 9876543210", 60, 37);

// LINE
doc.line(20, 50, 190, 50);

// TITLE
doc.setFontSize(14);
doc.text("FEE PAYMENT RECEIPT", 60, 60);

// DETAILS
doc.setFontSize(11);

doc.text("Receipt No: " + receiptNo, 20, 75);
doc.text("Date: " + document.getElementById("rDate").innerText, 140, 75);

doc.text("Student Name: " + document.getElementById("rName").innerText, 20, 90);
doc.text("Student ID: " + document.getElementById("rID").innerText, 20, 100);
doc.text("Class: " + document.getElementById("rClass").innerText, 20, 110);

// TABLE HEADER
doc.setFontSize(12);
doc.text("Description", 20, 130);
doc.text("Amount (₹)", 150, 130);

doc.line(20, 133, 190, 133);

// DATA
doc.setFontSize(11);
doc.text("School Fee Payment", 20, 145);
doc.text("₹ " + document.getElementById("rAmount").innerText, 150, 145);

doc.line(20, 150, 190, 150);

// TOTAL
doc.setFontSize(12);
doc.text("Total Paid: ₹ " + document.getElementById("rAmount").innerText, 20, 165);

// WATERMARK
doc.setTextColor(200,200,200);
doc.setFontSize(50);
doc.text("PAID", 60, 220, { angle: 45 });

// FOOTER
doc.setTextColor(0,0,0);
doc.setFontSize(10);
doc.text("Thank you for your payment!", 60, 280);

// SAVE
doc.save("SJJ_Receipt.pdf");

}

}
// CLOSE RECEIPT
function closeReceipt(){
receiptPopup.style.display="none";
}
function logout(){
if(confirm("Are you sure to logout?")){
localStorage.removeItem("studentID");
window.location = "parent-login.html";
}
}
// UPDATE
async function updatePayment(){
await db.collection("students_billing").doc(id).update({
Balance_Due:0
});
loadData();
}

// LOAD
loadData();

</script>

</body>
</html>
