<!DOCTYPE html>
<html>
<head>

<title>Sundar J.J School - Parent Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

.card{
background:white;
margin:15px;
padding:18px;
border-radius:15px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
border-left:5px solid #22c55e; /* green side line */
}

.card h3{
margin-bottom:10px;
color:#2563eb;
font-size:16px;
border-bottom:1px solid #eee;
padding-bottom:5px;
}

.row{
display:flex;
justify-content:space-between;
margin:8px 0;
font-size:14px;
}

.total{
color:#16a34a;
font-weight:bold;
font-size:17px;
}
  
.paid{
background:#dcfce7;
color:#166534;
padding:8px;
border-radius:8px;
text-align:center;
font-weight:bold;
}
  
body{
font-family:'Segoe UI';
background:#ecfdf5; /* light green */
margin:0;
}
  
.header{
background: linear-gradient(135deg,#16a34a,#15803d);
color:white;
padding:20px;
text-align:center;
}
  
button{padding:12px;width:100%;margin-top:10px;border:none;border-radius:8px;}
.payBtn{background:green;color:white;}
.logoutBtn{background:red;color:white;}
  

  
#paymentPopup,#receiptPopup{
display:none;position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.5);justify-content:center;align-items:center;
}
.popupBox{
background:white;
padding:20px;
border-radius:12px;
width:90%;
max-width:350px;
position:relative;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}
  #receiptContent{
position:relative;
}
.topLogo{
width:65px !important;
height:65px !important;
object-fit:contain;
display:block;
margin:0 auto 10px auto;
border-radius:50%;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}
  #historyBox .row{
background:#f0fdf4;
padding:8px;
border-radius:6px;
margin:5px 0;
font-size:13px;
}
</style>

</head>

<body>

<div class="header">
<img src="https://cdn-icons-png.flaticon.com/512/3135/3135755.png" class="topLogo">
<h2>Sundar J.J School</h2>
<p>Parent Dashboard</p>
</div>

<div id="content"></div>

<!-- PAYMENT POPUP -->
<div id="paymentPopup">
<div class="popupBox">
<h3>Payment Details</h3>
<div class="row"><span>Total Due</span><span id="dueAmount"></span></div>
<div class="row"><span>Charge (2%)</span><span id="chargeAmount"></span></div>
<hr>
<div class="row total"><span>Total Payable</span><span id="finalAmount"></span></div>
<button class="payBtn" onclick="confirmPayment()">Pay Now</button>
<button class="logoutBtn" onclick="closePopup()">Cancel</button>
</div>
</div>

<!-- RECEIPT POPUP -->
<div id="receiptPopup">
<div class="popupBox" id="receiptContent">

<div style="text-align:center;">

<img src="https://raw.githubusercontent.com/Sundarj-billing/sjjs-erp/main/logo.png" width="70">

<h2 style="margin:5px 0;">Sundar Jibaner Janna School</h2>

<p style="font-size:12px;color:gray;">
Fultali, Rajeshwarinagar, Dukli, West Tripura
</p>

</div>

<hr>

<h3 style="text-align:center;">Payment Receipt</h3>

<p><b>Receipt No:</b> <span id="rNo"></span></p>
<p><b>Name:</b> <span id="rName"></span></p>
<p><b>Student ID:</b> <span id="rID"></span></p>
<p><b>Class:</b> <span id="rClass"></span></p>
<p><b>Amount:</b> ₹<span id="rAmount"></span></p>
<p><b>Date:</b> <span id="rDate"></span></p>

<div style="position:absolute;top:40%;left:20%;font-size:60px;color:rgba(0,0,0,0.1);transform:rotate(-30deg);">
PAID
</div>

<button class="payBtn" onclick="downloadReceipt()">Download</button>
<button class="logoutBtn" onclick="closeReceipt()">Close</button>

</div>
  </div>
<script>

// Firebase
const firebaseConfig = {
apiKey: "AIzaSyArpgBPwqlP5AImr2h32VLmbtaxLr0Bknc",
authDomain: "sjjs-school-erp.firebaseapp.com",
projectId: "sjjs-school-erp",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let id = localStorage.getItem("studentID");
if(!id){
alert("Login first");
window.location="parent-login.html";
}

let finalPayAmount = 0;

// LOAD DATA
async function loadData(){

let doc = await db.collection("students_billing").doc(id).get();

if(doc.exists){

let data = doc.data();
  window.studentData = data;

let today = new Date().toLocaleDateString('en-IN',{
day:'numeric', month:'short', year:'numeric'
});

let baseTotal = Number(data.Balance_Due || 0);

let action = "";

if(baseTotal <= 0){
action = `<div class="paid">✅ Payment Completed</div>`;
}else{
action = `<button class="payBtn" onclick="openPaymentPopup(${baseTotal})">Pay Now</button>`;
}
document.getElementById("content").innerHTML = `

<div class="card">
<h3>👤 Student Details</h3>

<div class="row"><span>🧑 Name</span><span>${data.Student_Name}</span></div>
<div class="row"><span>🆔 Student ID</span><span>${data.Student_ID}</span></div>
<div class="row"><span>🏫 Class</span><span>${data.Class}</span></div>
<div class="row"><span>📅 Month</span><span>${data.Month || "N/A"}</span></div>
<div class="row"><span>📆 Date</span><span>${today}</span></div>
</div>

<div class="card">
<h3>💰 Payment Details</h3>

<div class="row"><span>💵 Monthly Fee</span><span>₹${data.Monthly_Fee || 0}</span></div>
<div class="row"><span>📝 Exam Fee</span><span>₹${data.Exam_Fee || 0}</span></div>
<div class="row"><span>📌 Previous Due</span><span>₹${data.Due_Previous || 0}</span></div>
<div class="row"><span>⏰ Late Fee</span><span>₹${data.Late_Fee || 0}</span></div>

<hr>

<div class="row total"><span>Total Due</span><span>₹${baseTotal}</span></div>

${action}
</div>

<div class="card">
<h3>📜 Payment History</h3>
<div id="historyBox">Loading...</div>
</div>

<div class="card">
<button class="logoutBtn" onclick="logout()">Logout</button>
</div>

`;
  loadHistory();
}
}
  // HISTORY BUTTON
  async function loadHistory(){

let historyHTML = "";

let snapshot = await db.collection("payment_history")
.where("Student_ID","==", id)
.limit(5)
.get();

if(snapshot.empty){
historyHTML = "<p>No payment history found</p>";
}else{

snapshot.forEach(doc => {
let d = doc.data();

historyHTML += `
<div class="row">
<span>₹${d.Amount}</span>
<span>${d.Date}</span>
</div>
`;
});

}

document.getElementById("historyBox").innerHTML = historyHTML;

}
  
// PAYMENT POPUP
function openPaymentPopup(amount){
let charge = Math.round(amount*0.02);
let final = amount+charge;

finalPayAmount = final;

dueAmount.innerText="₹"+amount;
chargeAmount.innerText="₹"+charge;
finalAmount.innerText="₹"+final;

paymentPopup.style.display="flex";
}

function closePopup(){
paymentPopup.style.display="none";
}

function confirmPayment(){
closePopup();
payNow(finalPayAmount);
}

// PAYMENT
async function payNow(amount){

let options = {
key:"rzp_test_STar8rHKqlaSNf",
amount:amount*100,
currency:"INR",
name:"SJJ School",

handler: async function(){

alert("✅ Payment Successful");

let data = window.studentData;

showReceipt(data,amount);

// 🔥 FIXED
let actualAmount = Math.round(amount / 1.02);
await updatePayment(actualAmount);

}

};

new Razorpay(options).open();
}

// RECEIPT SHOW
function showReceipt(data,amount){

let receiptNo = "SJ-"+Date.now();

rNo.innerText = receiptNo;
rName.innerText = data.Student_Name;
rID.innerText = data.Student_ID;
rClass.innerText = data.Class;
rAmount.innerText = amount;
rDate.innerText = new Date().toLocaleString();

receiptPopup.style.display="flex";
}

// DOWNLOAD PDF
function downloadReceipt(){

const { jsPDF } = window.jspdf;
let doc = new jsPDF();

// Data
let receiptNo = document.getElementById("rNo").innerText;
let name = document.getElementById("rName").innerText;
let idd = document.getElementById("rID").innerText;
let classs = document.getElementById("rClass").innerText;
let amount = document.getElementById("rAmount").innerText;
let date = document.getElementById("rDate").innerText;

// Logo
let logoUrl = "https://raw.githubusercontent.com/Sundarj-billing/sjjs-erp/main/logo.png";

// Watermark (image link বসাও)
let watermarkUrl = "https://raw.githubusercontent.com/Sundarj-billing/sjjs-erp/main/paid%20stamp.png?raw=true";

fetch(logoUrl)
.then(res => res.blob())
.then(blob => {

let reader = new FileReader();

reader.onload = function(){

// 🔷 BOX (card style)
doc.setDrawColor(0);
doc.setLineWidth(0.5);
doc.rect(10,10,190,270); // full box

// 🔷 LOGO
doc.addImage(reader.result,"PNG",90,15,30,30);
// 🔷 SCHOOL NAME
doc.setFont("helvetica","bold");
doc.setFontSize(16);
doc.text("SUNDAR JIBANER JANNA SCHOOL",105,55,{align:"center"});

// 🔷 ADDRESS
doc.setFontSize(10);
doc.setFont("helvetica","normal");
doc.text("Fultali, Rajeshwarinagar, Dukli, West Tripura",105,62,{align:"center"});

// LINE
doc.line(20,68,190,68);

// 🔷 TITLE
// GREEN + BOLD TITLE
doc.setTextColor(0,150,0);
doc.setFontSize(16);
doc.setFont("helvetica","bold");
doc.text("Payment Receipt",105,80,{align:"center"});

// RESET COLOR (important)
doc.setTextColor(0,0,0);

// 🔥 DETAILS (CENTER)
doc.setFontSize(11);

let y = 100;

doc.text("Receipt No: "+receiptNo,105,y,{align:"center"});
y+=10;
doc.text("Name: "+name,105,y,{align:"center"});
y+=10;
doc.text("Student ID: "+idd,105,y,{align:"center"});
y+=10;
doc.text("Class: "+classs,105,y,{align:"center"});
y+=10;

// ✅ Amount 
doc.setFont("helvetica","normal");
doc.text("Amount: Rs "+amount,105,y,{align:"center"});

// RESET COLOR
doc.setTextColor(0,0,0);
doc.setFont("helvetica","normal");

y+=10;
doc.text("Date: "+date,105,y,{align:"center"});

// ❤️ THANK YOU
doc.setFontSize(12);
doc.setTextColor(100);
doc.text("Thank you for your payment",105,y+20,{align:"center"});

// 🔥 WATERMARK (SMALL + CENTER)
fetch(watermarkUrl)
.then(res => res.blob())
.then(blob2 => {

let reader2 = new FileReader();

reader2.onload = function(){

// ছোট watermark (center)
doc.addImage(reader2.result,"PNG",27,15,40,40);

// SAVE
doc.save("SJJ_Receipt.pdf");

};

reader2.readAsDataURL(blob2);

});

};

reader.readAsDataURL(blob);

});

}

// CLOSE RECEIPT
function closeReceipt(){
receiptPopup.style.display="none";
}
function logout(){
if(confirm("Are you sure to logout?")){
localStorage.removeItem("studentID");
window.location = "parent-login.html";
}
}
// UPDATE
async function updatePayment(paidAmount){

if(!window.studentData){
alert("Data not loaded properly");
return;
}

let data = window.studentData;

let previousPaid = Number(data.Amount_Paid || 0);
let newPaid = previousPaid + paidAmount;

let newDue = 0;

// 🆕 CURRENT DATE
let paymentDate = new Date().toLocaleString("en-IN");

await db.collection("students_billing").doc(id).update({
Balance_Due: newDue,
Amount_Paid: newPaid,
Payment_Date: firebase.firestore.FieldValue.serverTimestamp()
});
// 🔥 SAVE PAYMENT HISTORY
await db.collection("payment_history").add({
Student_ID: data.Student_ID,
Name: data.Student_Name,
Class: data.Class,
Amount: paidAmount,
Date: new Date().toLocaleString("en-IN"),
Receipt_No: "SJ-"+Date.now()
  timestamp: Date.now()
});
// local update
data.Amount_Paid = newPaid;
data.Balance_Due = newDue;
data.Payment_Date = paymentDate;

loadData();
}

  // LOAD 
  loadData();

</script>

</body>
</html>
