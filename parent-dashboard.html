<!DOCTYPE html>
<html>
<head>

<title>Sundar J.J School - Parent Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
font-family:'Segoe UI', Arial;
background: linear-gradient(135deg,#3b82f6,#93c5fd);
padding:20px;
margin:0;
text-align:center;
}

.box{
background:white;
padding:25px;
border-radius:15px;
width:350px;
margin:auto;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.logo{
width:60px;
margin-bottom:10px;
}

.title{
color:#1e3a8a;
margin:5px 0;
}

.subtitle{
color:#555;
margin-bottom:20px;
font-size:14px;
}

.result{
margin-top:20px;
text-align:left;
background:#f1f5f9;
padding:15px;
border-radius:10px;
}

.result p{
margin:6px 0;
}

.total{
color:#dc2626;
font-weight:bold;
}

button{
padding:12px;
width:100%;
border:none;
color:white;
cursor:pointer;
border-radius:10px;
font-weight:bold;
margin-top:10px;
}

.payBtn{
background: linear-gradient(135deg,#2563eb,#1d4ed8);
}

.logoutBtn{
background:#ef4444;
}

</style>

</head>

<body>

<div class="box">

<!-- ✅ LOGO -->
<img src="https://cdn-icons-png.flaticon.com/512/3135/3135755.png" class="logo">

<h2 class="title">Sundar J.J School</h2>
<p class="subtitle">Parent Dashboard</p>

<div id="result" class="result">Loading...</div>

</div>

<script>

// Firebase Config
const firebaseConfig = {
apiKey: "AIzaSyArpgBPwqlP5AImr2h32VLmbtaxLr0Bknc",
authDomain: "sjjs-school-erp.firebaseapp.com",
projectId: "sjjs-school-erp",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// Login check
let id = localStorage.getItem("studentID");

if(!id){
alert("Login first");
window.location="parent-login.html";
}

// Load Data
async function loadData(){

try{

let doc = await db.collection("students_billing").doc(id).get();

if(doc.exists){

let data = doc.data();

// 🧠 safe default values
let prevDue = data.Previous_Due || 0;
let lateFee = data.Late_Fee || 0;
let month = data.Month || "N/A";
let date = data.Date || "N/A";

let totalDue = (data.Balance_Due || 0) + prevDue + lateFee;

let prevDue = data.Previous_Due || 0;
let lateFee = data.Late_Fee || 0;

let totalDue = (data.Balance_Due || 0) + prevDue + lateFee;

// 🔥 condition
let actionButton = "";

if(totalDue <= 0){
actionButton = `
<p style="color:green; font-weight:bold; text-align:center;">
✅ Already Paid
</p>
`;
}else{
actionButton = `
<button class="payBtn" onclick="payNow(${totalDue})">
Pay Now
</button>
`;
}

document.getElementById("result").innerHTML = `
<p><b>Name:</b> ${data.Student_Name}</p>
<p><b>Class:</b> ${data.Class}</p>

<p><b>Monthly Fee:</b> ₹${data.Monthly_Fee}</p>
<p><b>Previous Due:</b> ₹${prevDue}</p>
<p><b>Late Fee:</b> ₹${lateFee}</p>

<p><b>Total Due Amount:</b> ₹${totalDue}</p>

${actionButton}

<button class="logoutBtn" onclick="logout()">
Logout
</button>
`;

}else{
document.getElementById("result").innerHTML="❌ No data found";
}

}catch(err){
alert("Error: " + err.message);
}

}

// Payment
async function payNow(amount){

let charge = amount * 0.02
let total = Math.round(amount + charge)

let options = {
"key": "rzp_test_STar8rHKqlaSNf",
"amount": total * 100,
"currency": "INR",
"name": "SJJ School",
"description": "Fee Payment",
"handler": async function (){

alert("✅ Payment Successful")
await updatePayment(amount)

},
"theme": {
"color": "#2563eb"
}
}

let rzp = new Razorpay(options)
rzp.open()

}

// Logout
function logout(){
localStorage.removeItem("studentID");
window.location="parent-login.html";
}

// Update Payment
async function updatePayment(amount){

let ref = db.collection("students_billing").doc(id)
let doc = await ref.get()

if(doc.exists){

let data = doc.data()

let newDue = 0 // reset after full payment

await ref.update({
Balance_Due: newDue,
Previous_Due: 0,
Late_Fee: 0
})

// Save payment
await db.collection("stats").doc("payments_list").set({
list: firebase.firestore.FieldValue.arrayUnion({
Student_ID: id,
name: data.Student_Name,
amount: amount,
date: new Date().toISOString()
})
},{merge:true})

// Receipt
generateReceipt({
id: id,
name: data.Student_Name,
class: data.Class,
amount: amount
})

alert("🎉 Payment Done & Receipt Downloaded")
}

}

// PDF
function generateReceipt(data){

const { jsPDF } = window.jspdf
let doc = new jsPDF()

doc.text("SJJ School Payment Receipt", 20, 20)
doc.text("Student: " + data.name, 20, 40)
doc.text("Amount: ₹" + data.amount, 20, 50)

doc.save("receipt.pdf")

}

// Load
loadData()

</script>

</body>
</html>
