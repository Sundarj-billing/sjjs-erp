<!DOCTYPE html>
<html>
<head>

<title>Sundar J.J School - Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<style>
body{
font-family:Arial;
background: linear-gradient(135deg,#3b82f6,#93c5fd);
padding:20px;
text-align:center;
}

.box{
background:white;
padding:25px;
border-radius:15px;
width:350px;
margin:auto;
}

input,button{
padding:12px;
margin:10px;
width:90%;
border-radius:8px;
}

button{
background:#2563eb;
color:white;
border:none;
}

.result{
margin-top:20px;
text-align:left;
}
</style>

</head>

<body>

<div class="box">

<h2>Sundar J.J School</h2>
<p>Parent Dashboard</p>

<input id="studentID" placeholder="Enter Student ID">

<button onclick="searchStudent()">Search</button>

<div id="result" class="result"></div>

</div>

<script>


const firebaseConfig = {
 apiKey: "AIzaSyArpgBPwqlP5AImr2h32VLmbtaxLr0Bknc",
  authDomain: "sjjs-school-erp.firebaseapp.com",
  projectId: "sjjs-school-erp",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

async function searchStudent(){

let id=document.getElementById("studentID").value

if(!id){
alert("Enter Student ID")
return
}

try{

let doc = await db.collection("students_billing").doc(id).get()

if(doc.exists){

let data = doc.data()

document.getElementById("result").innerHTML=`

<p><b>Name:</b> ${data.Student_Name}</p>
<p><b>Class:</b> ${data.Class}</p>
<p><b>Monthly Fee:</b> ₹${data.Monthly_Fee}</p>
<p><b>Due Amount:</b> ₹${data.Balance_Due}</p>

<button onclick="payNow(${data.Balance_Due})">Pay Now</button>

`

}else{

document.getElementById("result").innerHTML="❌ Student not found"

}

}catch(err){
alert("Error fetching data")
}

}

function payNow(amount){
let charge=amount*0.02
let total=amount+charge
alert("Total Payment: ₹"+total)
}

</script>

</body>
</html>
