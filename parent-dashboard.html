<!DOCTYPE html>
<html>
<head>

<title>Sundar J.J School - Parent Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>

body{
font-family:'Segoe UI', Arial;
background: linear-gradient(135deg,#3b82f6,#93c5fd);
padding:20px;
margin:0;
text-align:center;
}

.box{
background:white;
padding:25px;
border-radius:15px;
width:350px;
margin:auto;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.title{
color:#1e3a8a;
margin-bottom:5px;
}

.subtitle{
color:#555;
margin-bottom:20px;
font-size:14px;
}

.result{
margin-top:20px;
text-align:left;
background:#f1f5f9;
padding:15px;
border-radius:10px;
}

button{
padding:12px;
width:100%;
border:none;
color:white;
cursor:pointer;
border-radius:10px;
font-weight:bold;
margin-top:10px;
}

.payBtn{
background: linear-gradient(135deg,#2563eb,#1d4ed8);
}

.logoutBtn{
background:#ef4444;
}

</style>

</head>

<body>

<div class="box">

<h2 class="title">Sundar J.J School</h2>
<p class="subtitle">Parent Dashboard</p>

<div id="result" class="result">Loading...</div>

</div>

<script>

// 🔴 Firebase Config
const firebaseConfig = {
apiKey: "AIzaSyArpgBPwqlP5AImr2h32VLmbtaxLr0Bknc",
authDomain: "sjjs-school-erp.firebaseapp.com",
projectId: "sjjs-school-erp",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 🔐 Check login
let id = localStorage.getItem("studentID");

if(!id){
alert("Login first");
window.location="parent-login.html";
}

// 📥 Load student data
async function loadData(){

try{

let doc = await db.collection("students_billing").doc(id).get();

if(doc.exists){

let data = doc.data();

document.getElementById("result").innerHTML = `
<p><b>Name:</b> ${data.Student_Name}</p>
<p><b>Class:</b> ${data.Class}</p>
<p><b>Monthly Fee:</b> ₹${data.Monthly_Fee}</p>
<p><b>Due Amount:</b> ₹${data.Balance_Due}</p>

<button class="payBtn" onclick="payNow(${data.Balance_Due})">
Pay Now
</button>

<button class="logoutBtn" onclick="logout()">
Logout
</button>
`;

}else{
document.getElementById("result").innerHTML="❌ No data found";
}

}catch(err){
alert("Error: " + err.message);
}

}

// 💰 Payment Calculation
function payNow(amount){

let charge = amount * 0.02;
let total = amount + charge;

alert("Total Payment (with 2% charge): ₹" + total);

}

// 🔓 Logout
function logout(){

localStorage.removeItem("studentID");
window.location="parent-login.html";

}

// 🚀 Load data on page load
loadData();

</script>

</body>
</html>
