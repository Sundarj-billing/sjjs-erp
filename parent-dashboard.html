<!DOCTYPE html>
<html>
<head>

<title>Sundar J.J School - Parent Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{font-family:'Segoe UI';background:#f1f5f9;margin:0;}
.header{background:#2563eb;color:white;padding:20px;text-align:center;}
.card{background:white;margin:15px;padding:15px;border-radius:10px;}
.row{display:flex;justify-content:space-between;margin:6px 0;}
.total{color:red;font-weight:bold;}
button{padding:12px;width:100%;margin-top:10px;border:none;border-radius:8px;}
.payBtn{background:green;color:white;}
.logoutBtn{background:red;color:white;}
.paid{text-align:center;color:green;font-weight:bold;}
#paymentPopup,#receiptPopup{
display:none;position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.5);justify-content:center;align-items:center;
}
.popupBox{background:white;padding:20px;border-radius:10px;width:90%;max-width:350px;}
</style>

</head>

<body>

<div class="header">
<h2>Sundar J.J School</h2>
<p>Parent Dashboard</p>
</div>

<div id="content"></div>

<!-- PAYMENT POPUP -->
<div id="paymentPopup">
<div class="popupBox">
<h3>Payment Details</h3>
<div class="row"><span>Total Due</span><span id="dueAmount"></span></div>
<div class="row"><span>Charge (2%)</span><span id="chargeAmount"></span></div>
<hr>
<div class="row total"><span>Total Payable</span><span id="finalAmount"></span></div>
<button class="payBtn" onclick="confirmPayment()">Pay Now</button>
<button class="logoutBtn" onclick="closePopup()">Cancel</button>
</div>
</div>

<!-- RECEIPT POPUP -->
<div id="receiptPopup">
<div class="popupBox" id="receiptContent">

<h3 style="text-align:center;">Payment Receipt</h3>

<p><b>Receipt No:</b> <span id="rNo"></span></p>
<p><b>Name:</b> <span id="rName"></span></p>
<p><b>Student ID:</b> <span id="rID"></span></p>
<p><b>Class:</b> <span id="rClass"></span></p>
<p><b>Amount:</b> ₹<span id="rAmount"></span></p>
<p><b>Date:</b> <span id="rDate"></span></p>

<div style="position:absolute;top:40%;left:20%;font-size:60px;color:rgba(0,0,0,0.1);transform:rotate(-30deg);">
PAID
</div>

<button class="payBtn" onclick="downloadReceipt()">Download</button>
<button class="logoutBtn" onclick="closeReceipt()">Close</button>

</div>
</div>

<script>

// Firebase
const firebaseConfig = {
apiKey: "AIzaSyArpgBPwqlP5AImr2h32VLmbtaxLr0Bknc",
authDomain: "sjjs-school-erp.firebaseapp.com",
projectId: "sjjs-school-erp",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let id = localStorage.getItem("studentID");
if(!id){
alert("Login first");
window.location="parent-login.html";
}

let finalPayAmount = 0;

// LOAD DATA
async function loadData(){

let doc = await db.collection("students_billing").doc(id).get();

if(doc.exists){

let data = doc.data();

let baseTotal = Number(data.Balance_Due || 0);

let action = "";

if(baseTotal <= 0){
action = `<div class="paid">✅ Payment Completed</div>`;
}else{
action = `<button class="payBtn" onclick="openPaymentPopup(${baseTotal})">Pay Now</button>`;
}
  document.getElementById("content").innerHTML = `

<div class="card">
<div class="row"><b>Name:</b> ${data.Student_Name}</div>
<div class="row"><b>Student ID:</b> ${data.Student_ID}</div>
<div class="row"><b>Class:</b> ${data.Class}</div>
<div class="row"><b>Month:</b> ${data.Month || "N/A"}</div>
<div class="row"><b>Date:</b> ${today}</div>
</div>

<div class="card">
<div class="row"><span>Monthly Fee</span><span>₹${data.Monthly_Fee || 0}</span></div>
<div class="row"><span>Exam Fee</span><span>₹${data.Exam_Fee || 0}</span></div>
<div class="row"><span>Previous Due</span><span>₹${data.Due_Previous || 0}</span></div>
<div class="row"><span>Late Fee</span><span>₹${data.Late_Fee || 0}</span></div>

<hr>

<div class="row total"><span>Total Due</span><span>₹${baseTotal}</span></div>

${action}
</div>

<div class="card">
<button class="logoutBtn" onclick="logout()">Logout</button>
</div>
`;
}
}

// PAYMENT POPUP
function openPaymentPopup(amount){
let charge = Math.round(amount*0.02);
let final = amount+charge;

finalPayAmount = final;

dueAmount.innerText="₹"+amount;
chargeAmount.innerText="₹"+charge;
finalAmount.innerText="₹"+final;

paymentPopup.style.display="flex";
}

function closePopup(){
paymentPopup.style.display="none";
}

function confirmPayment(){
closePopup();
payNow(finalPayAmount);
}

// PAYMENT
async function payNow(amount){

let options = {
key:"rzp_test_STar8rHKqlaSNf",
amount:amount*100,
currency:"INR",
name:"SJJ School",

handler: async function(){

alert("✅ Payment Successful");

let docSnap = await db.collection("students_billing").doc(id).get();
let data = docSnap.data();

showReceipt(data,amount);

await updatePayment();

}

};

new Razorpay(options).open();
}

// RECEIPT SHOW
function showReceipt(data,amount){

let receiptNo = "SJ-"+Date.now();

rNo.innerText = receiptNo;
rName.innerText = data.Student_Name;
rID.innerText = data.Student_ID;
rClass.innerText = data.Class;
rAmount.innerText = amount;
rDate.innerText = new Date().toLocaleString();

receiptPopup.style.display="flex";
}

// DOWNLOAD PDF
function downloadReceipt(){

const { jsPDF } = window.jspdf;
let doc = new jsPDF();

doc.text("SJJ School Receipt",20,20);
doc.text("Receipt No: "+rNo.innerText,20,30);
doc.text("Name: "+rName.innerText,20,40);
doc.text("ID: "+rID.innerText,20,50);
doc.text("Class: "+rClass.innerText,20,60);
doc.text("Amount: ₹"+rAmount.innerText,20,70);
doc.text("Date: "+rDate.innerText,20,80);

doc.setTextColor(200,200,200);
doc.setFontSize(40);
doc.text("PAID",60,140,{angle:45});

doc.save("receipt.pdf");
}

// CLOSE RECEIPT
function closeReceipt(){
receiptPopup.style.display="none";
}

// UPDATE
async function updatePayment(){
await db.collection("students_billing").doc(id).update({
Balance_Due:0
});
loadData();
}

// LOAD
loadData();

</script>

</body>
</html>
