<!DOCTYPE html>
<html>
<head>

<title>SJJS PRO ERP</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<style>

body{
font-family:Segoe UI;
margin:0;
background:#f4f6fb;
}

.sidebar{
width:220px;
height:100vh;
background:#111827;
color:white;
position:fixed;
}

.logo{
padding:20px;
font-size:22px;
text-align:center;
border-bottom:1px solid #333;
}

.sidebar a{
display:block;
padding:15px;
cursor:pointer;
border-bottom:1px solid #333;
}

.sidebar a:hover{
background:#1f2937;
}

.main{
margin-left:220px;
padding:25px;
}

.cards{
display:flex;
gap:20px;
flex-wrap:wrap;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
flex:1;
min-width:200px;
}

input{
padding:8px;
margin:5px;
}

button{
background:#16a34a;
color:white;
border:none;
padding:8px 12px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
background:white;
}

th{
background:#2563eb;
color:white;
padding:10px;
}

td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:center;
}

</style>

</head>

<body>

<div class="sidebar">

<div class="logo">SJJS ERP</div>

<a onclick="showSection('dashboard')">Dashboard</a>
<a onclick="showSection('students')">Students</a>
<a onclick="showSection('payments')">Payments</a>
<a onclick="logout()">Logout</a>

</div>

<div class="main">

<div id="dashboard">

<h2>Dashboard</h2>

<div class="cards">

<div class="card">
<h3>Total Students</h3>
<p id="totalStudents">0</p>
</div>

<div class="card">
<h3>Total Income</h3>
<p id="totalIncome">₹0</p>
</div>

</div>

</div>

<div id="students" style="display:none">

<h2>Students</h2>

<table id="studentTable">

<tr>
<th>ID</th>
<th>Class</th>
<th>Due</th>
</tr>

</table>

</div>

<div id="payments" style="display:none">

<h2>Payments</h2>

<table id="paymentTable">

<tr>
<th>Student</th>
<th>Amount</th>
<th>Date</th>
</tr>

</table>

</div>

</div>

<script>

const firebaseConfig={
apiKey:"AIzaSyArpgBPwqlP5AImr2h32VLmbtaxLr0Bknc",
authDomain:"sjjs-school-erp.firebaseapp.com",
projectId:"sjjs-school-erp"
};

firebase.initializeApp(firebaseConfig);

const db=firebase.firestore();

firebase.auth().onAuthStateChanged(user=>{

if(!user){

window.location="login.html";

}

});

function logout(){

firebase.auth().signOut().then(()=>{

window.location="login.html";

});

}

function showSection(sec){

document.getElementById("dashboard").style.display="none";
document.getElementById("students").style.display="none";
document.getElementById("payments").style.display="none";

document.getElementById(sec).style.display="block";

}

function loadStudents(){

db.collection("students_billing").onSnapshot(snap=>{

let table=document.getElementById("studentTable");

table.innerHTML=`<tr>
<th>ID</th>
<th>Class</th>
<th>Due</th>
</tr>`;

document.getElementById("totalStudents").innerText=snap.size;

snap.forEach(doc=>{

let s=doc.data();

table.innerHTML+=`

<tr>
<td>${doc.id}</td>
<td>${s.Class}</td>
<td>₹${s.Balance_Due}</td>
</tr>

`;

});

});

}

function loadPayments(){

db.collection("payments").onSnapshot(snap=>{

let table=document.getElementById("paymentTable");

table.innerHTML=`<tr>
<th>Student</th>
<th>Amount</th>
<th>Date</th>
</tr>`;

let income=0;

snap.forEach(doc=>{

let p=doc.data();

income+=p.amount;

table.innerHTML+=`

<tr>
<td>${p.student}</td>
<td>₹${p.amount}</td>
<td>${p.date}</td>
</tr>

`;

});

document.getElementById("totalIncome").innerText="₹"+income;

});

}

loadStudents();
loadPayments();

</script>

</body>
</html>
