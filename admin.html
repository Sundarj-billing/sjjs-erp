<!DOCTYPE html>
<html>
<head>

<title>SJJS PRO ERP</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<style>

body{
font-family:Segoe UI;
margin:0;
background:#f4f6fb;
}

.sidebar{
width:220px;
height:100vh;
background:#111827;
color:white;
position:fixed;
}

.logo{
padding:20px;
font-size:22px;
text-align:center;
border-bottom:1px solid #333;
}

.sidebar a{
display:block;
padding:15px;
cursor:pointer;
border-bottom:1px solid #333;
}

.sidebar a:hover{
background:#1f2937;
}

.main{
margin-left:220px;
padding:25px;
}

.cards{
display:flex;
gap:20px;
flex-wrap:wrap;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
flex:1;
min-width:200px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
background:white;
}

th{
background:#2563eb;
color:white;
padding:10px;
}

td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:center;
}

</style>

</head>

<body>

<div class="sidebar">

<div class="logo">SJJS ERP</div>

<a onclick="logout()">Logout</a>

</div>

<div class="main">

<h2>Dashboard</h2>

<div class="cards">

<div class="card">
<h3>Total Students</h3>
<p id="totalStudents">0</p>
</div>

<div class="card">
<h3>Total Income</h3>
<p id="totalIncome">₹0</p>
</div>

</div>

</div>

<script>

const firebaseConfig={
apiKey:"AIzaSyArpgBPwqlP5AImr2h32VLmbtaxLr0Bknc",
authDomain:"sjjs-school-erp.firebaseapp.com",
projectId:"sjjs-school-erp"
};

firebase.initializeApp(firebaseConfig);

const db=firebase.firestore();

firebase.auth().onAuthStateChanged(user=>{

if(!user){

window.location="login.html";

}

});

function logout(){

firebase.auth().signOut().then(()=>{

window.location="login.html";

});

}

</script>

</body>
</html>
