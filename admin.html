<!DOCTYPE html>
<html>
<head>

<title>SJJS SUPER ERP</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Segoe UI;
margin:0;
background:#eef2f7;
}

.sidebar{
width:220px;
height:100vh;
background:#111827;
color:white;
position:fixed;
}

.logo{
padding:20px;
font-size:22px;
text-align:center;
border-bottom:1px solid #333;
}

.sidebar a{
display:block;
padding:15px;
cursor:pointer;
border-bottom:1px solid #333;
}

.sidebar a:hover{
background:#1f2937;
}

.main{
margin-left:220px;
padding:25px;
}

.cards{
display:flex;
flex-wrap:wrap;
gap:20px;
}

.card{
flex:1;
min-width:200px;
padding:20px;
border-radius:12px;
color:white;
font-weight:bold;
box-shadow:0 5px 15px rgba(0,0,0,0.15);
}

.blue{background:#2563eb;}
.green{background:#16a34a;}
.orange{background:#f97316;}
.red{background:#ef4444;}
.purple{background:#7c3aed;}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
background:white;
}

th{
background:#2563eb;
color:white;
padding:10px;
}

td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:center;
}

canvas{
background:white;
padding:20px;
border-radius:10px;
margin-top:25px;
}

.paid{color:#16a34a;font-weight:bold;}
.partial{color:#f59e0b;font-weight:bold;}
.due{color:#ef4444;font-weight:bold;}

.section{display:none;}
.active{display:block;}

</style>

</head>

<body>

<div class="sidebar">

<div class="logo">SJJS ERP</div>

<a onclick="show('dashboard')">Dashboard</a>
<a onclick="show('students')">Students</a>
<a onclick="show('payments')">Payments</a>
<a onclick="logout()">Logout</a>

</div>

<div class="main">

<!-- DASHBOARD -->

<div id="dashboard" class="section active">

<h2>Dashboard</h2>

<div class="cards">

<div class="card blue">
Total Students
<h2 id="totalStudents">0</h2>
</div>

<div class="card green">
Total Income
<h2 id="totalIncome">₹0</h2>
</div>

<div class="card orange">
Today Payment
<h2 id="todayIncome">₹0</h2>
</div>

<div class="card red">
Total Due
<h2 id="totalDue">₹0</h2>
</div>

<div class="card purple">
Due This Month
<h2 id="monthDue">₹0</h2>
</div>

</div>

<canvas id="incomeChart"></canvas>

<h3>Due Students</h3>

<table id="dueTable">
<tr>
<th>Student ID</th>
<th>Class</th>
<th>Due Amount</th>
</tr>
</table>

</div>

<!-- STUDENTS -->

<div id="students" class="section">

<h2>Students</h2>

<table id="studentTable">

<tr>
<th>ID</th>
<th>Class</th>
<th>Fee</th>
<th>Due</th>
<th>Status</th>
</tr>

</table>

</div>

<!-- PAYMENTS -->

<div id="payments" class="section">

<h2>Payments</h2>

<table id="paymentTable">

<tr>
<th>Student</th>
<th>Amount</th>
<th>Date</th>
</tr>

</table>

</div>

</div>

<script>

const firebaseConfig={
apiKey:"AIzaSyArpgBPwqlP5AImr2h32VLmbtaxLr0Bknc",
authDomain:"sjjs-school-erp.firebaseapp.com",
projectId:"sjjs-school-erp"
};

firebase.initializeApp(firebaseConfig);

const db=firebase.firestore();

/* AUTH CHECK */

firebase.auth().onAuthStateChanged(user=>{

if(!user){
window.location="login.html";
}

});

/* LOGOUT */

function logout(){

firebase.auth().signOut().then(()=>{
window.location="login.html";
})

}

/* NAVIGATION */

function show(sec){

document.querySelectorAll(".section").forEach(s=>{
s.classList.remove("active")
})

document.getElementById(sec).classList.add("active")

}

/* STATUS FUNCTION */

function getStatus(fee,due){

if(due==0) return "Paid"
if(due<fee) return "Partial"
return "Due"

}

/* LOAD STUDENTS */

function loadStudents(){

db.collection("students_billing").onSnapshot(snap=>{

let table=document.getElementById("studentTable")
let dueTable=document.getElementById("dueTable")

table.innerHTML=`<tr>
<th>ID</th><th>Class</th><th>Fee</th><th>Due</th><th>Status</th>
</tr>`

dueTable.innerHTML=`<tr>
<th>Student ID</th><th>Class</th><th>Due Amount</th>
</tr>`

let totalDue=0
let monthDue=0

document.getElementById("totalStudents").innerText=snap.size

snap.forEach(doc=>{

let s=doc.data()

let fee=s.Monthly_Fee || 0
let due=s.Balance_Due || 0

let status=getStatus(fee,due)

totalDue+=due
monthDue+=due

table.innerHTML+=`

<tr>
<td>${doc.id}</td>
<td>${s.Class}</td>
<td>₹${fee}</td>
<td>₹${due}</td>
<td class="${status.toLowerCase()}">${status}</td>
</tr>

`

if(due>0){

dueTable.innerHTML+=`

<tr>
<td>${doc.id}</td>
<td>${s.Class}</td>
<td>₹${due}</td>
</tr>

`

}

})

document.getElementById("totalDue").innerText="₹"+totalDue
document.getElementById("monthDue").innerText="₹"+monthDue

})

}

/* LOAD PAYMENTS */

function loadPayments(){

db.collection("payments").onSnapshot(snap=>{

let table=document.getElementById("paymentTable")

table.innerHTML=`<tr>
<th>Student</th><th>Amount</th><th>Date</th>
</tr>`

let income=0
let today=0

let todayDate=new Date().toLocaleDateString()

snap.forEach(doc=>{

let p=doc.data()

income+=p.amount

if(p.date===todayDate){
today+=p.amount
}

table.innerHTML+=`

<tr>
<td>${p.student}</td>
<td>₹${p.amount}</td>
<td>${p.date}</td>
</tr>

`

})

document.getElementById("totalIncome").innerText="₹"+income
document.getElementById("todayIncome").innerText="₹"+today

updateChart(income)

})

}

/* CHART */

let chart

function updateChart(income){

let ctx=document.getElementById("incomeChart")

if(chart) chart.destroy()

chart=new Chart(ctx,{

type:'bar',

data:{
labels:['School Income'],
datasets:[{
label:'Income',
data:[income],
backgroundColor:'#16a34a'
}]
}

})

}

loadStudents()
loadPayments()

</script>

</body>
</html>
