<!DOCTYPE html>
<html>
<head>

<title>SJJS SUPER ERP</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Segoe UI;
margin:0;
background:#f4f6fb;
}

.sidebar{
width:220px;
height:100vh;
background:#111827;
color:white;
position:fixed;
}

.logo{
padding:20px;
font-size:22px;
text-align:center;
border-bottom:1px solid #333;
}

.sidebar a{
display:block;
padding:15px;
cursor:pointer;
border-bottom:1px solid #333;
}

.sidebar a:hover{
background:#1f2937;
}

.main{
margin-left:220px;
padding:25px;
}

.cards{
display:flex;
gap:20px;
flex-wrap:wrap;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
flex:1;
min-width:200px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
background:white;
}

th{
background:#2563eb;
color:white;
padding:10px;
}

td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:center;
}

input{
padding:8px;
margin-top:10px;
}

canvas{
background:white;
padding:20px;
border-radius:10px;
margin-top:20px;
}

.section{
display:none;
}

.active{
display:block;
}

</style>

</head>

<body>

<div class="sidebar">

<div class="logo">SJJS ERP</div>

<a onclick="show('dashboard')">Dashboard</a>
<a onclick="show('students')">Students</a>
<a onclick="show('payments')">Payments</a>
<a onclick="logout()">Logout</a>

</div>

<div class="main">

<!-- DASHBOARD -->

<div id="dashboard" class="section active">

<h2>Dashboard</h2>

<div class="cards">

<div class="card">
<h3>Total Students</h3>
<p id="totalStudents">0</p>
</div>

<div class="card">
<h3>Total Income</h3>
<p id="totalIncome">₹0</p>
</div>

</div>

<canvas id="incomeChart"></canvas>

</div>

<!-- STUDENTS -->

<div id="students" class="section">

<h2>Students</h2>

<input id="search" placeholder="Search Student ID" onkeyup="searchStudent()">

<table id="studentTable">

<tr>
<th>ID</th>
<th>Class</th>
<th>Balance Due</th>
</tr>

</table>

</div>

<!-- PAYMENTS -->

<div id="payments" class="section">

<h2>Payments</h2>

<table id="paymentTable">

<tr>
<th>Student</th>
<th>Amount</th>
<th>Date</th>
</tr>

</table>

</div>

</div>

<script>

const firebaseConfig={
apiKey:"AIzaSyArpgBPwqlP5AImr2h32VLmbtaxLr0Bknc",
authDomain:"sjjs-school-erp.firebaseapp.com",
projectId:"sjjs-school-erp"
};

firebase.initializeApp(firebaseConfig);

const db=firebase.firestore();

firebase.auth().onAuthStateChanged(user=>{

if(!user){

window.location="login.html";

}

});

function logout(){

firebase.auth().signOut().then(()=>{

window.location="login.html";

});

}

function show(sec){

document.querySelectorAll(".section").forEach(s=>{

s.classList.remove("active")

})

document.getElementById(sec).classList.add("active")

}

let studentsCache=[]

function loadStudents(){

db.collection("students_billing").onSnapshot(snap=>{

let table=document.getElementById("studentTable")

table.innerHTML=`<tr>
<th>ID</th>
<th>Class</th>
<th>Balance Due</th>
</tr>`

studentsCache=[]

document.getElementById("totalStudents").innerText=snap.size

snap.forEach(doc=>{

let s=doc.data()

studentsCache.push({
id:doc.id,
class:s.Class,
due:s.Balance_Due
})

table.innerHTML+=`

<tr>
<td>${doc.id}</td>
<td>${s.Class}</td>
<td>₹${s.Balance_Due}</td>
</tr>

`

})

})

}

function searchStudent(){

let val=document.getElementById("search").value.toLowerCase()

let table=document.getElementById("studentTable")

table.innerHTML=`<tr>
<th>ID</th>
<th>Class</th>
<th>Balance Due</th>
</tr>`

studentsCache.forEach(s=>{

if(s.id.toLowerCase().includes(val)){

table.innerHTML+=`

<tr>
<td>${s.id}</td>
<td>${s.class}</td>
<td>₹${s.due}</td>
</tr>

`

}

})

}

function loadPayments(){

db.collection("payments").onSnapshot(snap=>{

let table=document.getElementById("paymentTable")

table.innerHTML=`<tr>
<th>Student</th>
<th>Amount</th>
<th>Date</th>
</tr>`

let income=0

snap.forEach(doc=>{

let p=doc.data()

income+=p.amount

table.innerHTML+=`

<tr>
<td>${p.student}</td>
<td>₹${p.amount}</td>
<td>${p.date}</td>
</tr>

`

})

document.getElementById("totalIncome").innerText="₹"+income

updateChart(income)

})

}

let chart

function updateChart(income){

let ctx=document.getElementById("incomeChart")

if(chart) chart.destroy()

chart=new Chart(ctx,{

type:'bar',

data:{
labels:['Total Income'],
datasets:[{
label:'School Income',
data:[income]
}]
}

})

}

loadStudents()
loadPayments()

</script>

</body>
</html>
